               dur="4s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="220" y="100" opacity="0">︻デ═-   ·
      <animate attributeName="opacity" values="0;0;1;0;0"
               keyTimes="0;0.25;0.5;0.75;1"
               dur="4s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="220" y="100" opacity="0">︻デ═一
      <animate attributeName="opacity" values="0;0;0;1;0"
               keyTimes="0;0.25;0.5;0.75;1"
               dur="4s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
  </g>

  <g>
