<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320" role="img" aria-label="texanshootR mascot animation">
  <defs>
    <style>
      .bg    { fill: #0d1117; }
      text   { font-family: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace; }
      .body  { fill: #c9d1d9; font-size: 16px; }
      .gun   { fill: #f0883e; font-size: 16px; }
      .stat  { font-size: 12px; }
      .pwarm { fill: #d29922; }
      .phot  { fill: #f85149; }
      .pwin  { fill: #56d364; }
      .dim   { fill: #6e7681; font-size: 11px; }
    </style>
  </defs>

  <rect class="bg" width="480" height="320" rx="10"/>

  <circle cx="22" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="22" r="6" fill="#27c93f"/>
  <text class="dim" x="84" y="26">~ R -e 'shoot(mtcars)'</text>

  <g class="body">
    <text x="130" y="70">        _____</text>
    <text x="130" y="90">       /_____\</text>
    <text x="130" y="110">   ___|_______|___</text>
    <text x="130" y="150">        /| |\</text>
    <text x="130" y="170">        |* *|</text>
    <text x="130" y="190">        | | |</text>
    <text x="130" y="210">       d/   \b</text>
  </g>

  <g class="body">
    <text x="130" y="130" opacity="0">       ( -_- )
      <animate attributeName="opacity" values="1;0;0;0;0;1"
               keyTimes="0;0.2;0.4;0.6;0.8;1"
               dur="30s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="130" y="130" opacity="0">       ( o_o )
      <animate attributeName="opacity" values="0;1;0;0;0;0"
               keyTimes="0;0.2;0.4;0.6;0.8;1"
               dur="30s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="130" y="130" opacity="0">       ( O_O )
      <animate attributeName="opacity" values="0;0;1;0;0;0"
               keyTimes="0;0.2;0.4;0.6;0.8;1"
               dur="30s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="130" y="130" opacity="0">       ( ;_; )
      <animate attributeName="opacity" values="0;0;0;1;0;0"
               keyTimes="0;0.2;0.4;0.6;0.8;1"
               dur="30s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="130" y="130" opacity="0">       (⌐■_■)
      <animate attributeName="opacity" values="0;0;0;0;1;0"
               keyTimes="0;0.2;0.4;0.6;0.8;1"
               dur="30s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
  </g>

  <g class="gun">
    <text x="245" y="130" opacity="0">︻デ═一  ·
      <animate attributeName="opacity" values="1;0;0;0;1"
               keyTimes="0;0.25;0.5;0.75;1"
               dur="5s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="245" y="130" opacity="0">︻デ═一   *
      <animate attributeName="opacity" values="0;1;0;0;0"
               keyTimes="0;0.25;0.5;0.75;1"
               dur="5s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="245" y="130" opacity="0">︻デ═-   ·
      <animate attributeName="opacity" values="0;0;1;0;0"
               keyTimes="0;0.25;0.5;0.75;1"
               dur="5s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="245" y="130" opacity="0">︻デ═一
      <animate attributeName="opacity" values="0;0;0;1;0"
               keyTimes="0;0.25;0.5;0.75;1"
               dur="5s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
  </g>

  <g>
    <text class="stat pwarm" x="80" y="255" opacity="0">[  60/300 ]  composed     best p = 0.412
      <animate attributeName="opacity" values="1;0;0;0;0;1"
               keyTimes="0;0.2;0.4;0.6;0.8;1"
               dur="30s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text class="stat pwarm" x="80" y="255" opacity="0">[ 130/300 ]  uncertain    best p = 0.187
      <animate attributeName="opacity" values="0;1;0;0;0;0"
               keyTimes="0;0.2;0.4;0.6;0.8;1"
               dur="30s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text class="stat phot" x="80" y="255" opacity="0">[ 210/300 ]  anxious      best p = 0.094
      <animate attributeName="opacity" values="0;0;1;0;0;0"
               keyTimes="0;0.2;0.4;0.6;0.8;1"
               dur="30s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text class="stat phot" x="80" y="255" opacity="0">[ 280/300 ]  desperate    *escalating to derived metrics*
      <animate attributeName="opacity" values="0;0;0;1;0;0"
               keyTimes="0;0.2;0.4;0.6;0.8;1"
               dur="30s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text class="stat pwin" x="80" y="255" opacity="0">[ 300/300 ]  PUBLISHABLE  p = 0.045  [OK]
      <animate attributeName="opacity" values="0;0;0;0;1;0"
               keyTimes="0;0.2;0.4;0.6;0.8;1"
               dur="30s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
  </g>

  <text class="dim" x="80" y="285">manuscript(run)   preprint(run)   funding(run)</text>
</svg>
