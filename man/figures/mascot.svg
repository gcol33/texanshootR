    </text>
    <text class="stat phot" x="80" y="150" opacity="0">[ 240/300 ]  panicked     best p = 0.061
      <animate attributeName="opacity" values="0;0;0;0;1;0;0;0"
               keyTimes="0;0.143;0.286;0.429;0.571;0.714;0.857;1"
               dur="21s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text class="stat phot" x="80" y="150" opacity="0">[ 280/300 ]  desperate    *escalating to derived metrics*
      <animate attributeName="opacity" values="0;0;0;0;0;1;0;0"
               keyTimes="0;0.143;0.286;0.429;0.571;0.714;0.857;1"
               dur="21s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text class="stat pwin" x="80" y="150" opacity="0">[ 300/300 ]  PUBLISHABLE  p = 0.045  [OK]
      <animate attributeName="opacity" values="0;0;0;0;0;0;1;0"
               keyTimes="0;0.143;0.286;0.429;0.571;0.714;0.857;1"
