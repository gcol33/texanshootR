    </text>
    <text class="stat pwarm" x="80" y="150" opacity="0">[ 140/300 ]  worried      best p = 0.187
      <animate attributeName="opacity" values="0;0;1;0;0;0;0;0"
               keyTimes="0;0.143;0.286;0.429;0.571;0.714;0.857;1"
