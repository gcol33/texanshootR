<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200" role="img" aria-label="texanshootR mascot animation">
  <defs>
    <style>
      .bg    { fill: #0d1117; }
      text   { font-family: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace; }
      .face  { fill: #c9d1d9; font-size: 22px; }
      .gun   { fill: #f0883e; font-size: 22px; }
      .stat  { font-size: 12px; }
      .pwarm { fill: #d29922; }
      .phot  { fill: #f85149; }
      .pwin  { fill: #56d364; }
      .dim   { fill: #6e7681; font-size: 11px; }
    </style>
  </defs>

  <rect class="bg" width="480" height="200" rx="10"/>

  <circle cx="22" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="22" r="6" fill="#27c93f"/>
  <text class="dim" x="84" y="26">~ R -e 'shoot(mtcars)'</text>

  <g class="face">
    <text x="120" y="100" opacity="0">( o_o)
      <animate attributeName="opacity" values="1;0;0;0;0;0;0;1"
               keyTimes="0;0.143;0.286;0.429;0.571;0.714;0.857;1"
               dur="21s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="120" y="100" opacity="0">( -_- )
      <animate attributeName="opacity" values="0;1;0;0;0;0;0;0"
               keyTimes="0;0.143;0.286;0.429;0.571;0.714;0.857;1"
               dur="21s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="120" y="100" opacity="0">( o_o;)
      <animate attributeName="opacity" values="0;0;1;0;0;0;0;0"
               keyTimes="0;0.143;0.286;0.429;0.571;0.714;0.857;1"
               dur="21s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="120" y="100" opacity="0">( •_•;)
      <animate attributeName="opacity" values="0;0;0;1;0;0;0;0"
               keyTimes="0;0.143;0.286;0.429;0.571;0.714;0.857;1"
               dur="21s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="120" y="100" opacity="0">(>_<;)
      <animate attributeName="opacity" values="0;0;0;0;1;0;0;0"
               keyTimes="0;0.143;0.286;0.429;0.571;0.714;0.857;1"
               dur="21s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="120" y="100" opacity="0">(ಠ_ಠ)
      <animate attributeName="opacity" values="0;0;0;0;0;1;0;0"
               keyTimes="0;0.143;0.286;0.429;0.571;0.714;0.857;1"
               dur="21s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="120" y="100" opacity="0">( -_-)
      <animate attributeName="opacity" values="0;0;0;0;0;0;1;0"
               keyTimes="0;0.143;0.286;0.429;0.571;0.714;0.857;1"
               dur="21s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
  </g>

  <g class="gun">
    <text x="220" y="100" opacity="0">︻デ═一  ·
      <animate attributeName="opacity" values="1;0;0;0;1"
               keyTimes="0;0.25;0.5;0.75;1"
               dur="4s" repeatCount="indefinite" calcMode="discrete"/>
    </text>
    <text x="220" y="100" opacity="0">︻デ═一   *
      <animate attributeName="opacity" values="0;1;0;0;0"
