# Life events — random encounters during shoot() runs. Two-part:
# event_text + consequence_text. Optional `effects` apply temporary
# modifiers to the run state.

- id: email_expired
  event_text: "Institutional email password expired."
  consequence_text: "Productivity reduced."
  tags: [admin]
  rarity: uncommon
  career_min: ~
  display_phase: any
  effects:
    throughput: -0.15
    typo_probability: 0.10

- id: supervisor_interesting
  event_text: "Supervisor replied 'interesting'."
  consequence_text: "Interpretation confidence decreased."
  tags: [admin, narrative]
  rarity: uncommon
  career_min: ~
  display_phase: any
  effects:
    interpretation_confidence: -0.15
    narrative_strength: -0.10

