- id: pseudo_morans_deferred
  text: "Moran's I deferred to the revision round..."
  tags: [validation_leakage, post_hoc]
  rarity: uncommon
  trigger_phase: loading

- id: pseudo_residual_clusters
  text: "Residuals cluster spatially -- structure declared exogenous..."
