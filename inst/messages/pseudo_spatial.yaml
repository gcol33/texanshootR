# Pseudo-spatial messages — fired when +pseudo_spatial is active, or
# when the search adds geographic coordinates as fixed effects and
# treats that as having handled spatial autocorrelation.

- id: pseudo_coords_added
  text: "Coordinates added as fixed effects..."
  tags: [omitted_variable, spatial]
  rarity: common
  trigger_phase: loading

- id: pseudo_spatial_aware
