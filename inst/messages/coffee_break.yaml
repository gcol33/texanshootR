# Coffee-break messages -- fired when +coffee_break is active, or when
# the search responds to a substantive methodological concern by moving
# the discussion to an unrecorded verbal venue, leaving the written
# record clean of the dispute.
#
# Cursed-practice language tells (sighted in field reports 2025):
#   "let's discuss this in a coffee break at the retreat."
#   "small side-meeting at the workshop margins."
#   "happy to sort this out informally."
#   "let's grab a coffee about it."
#   "we can talk about this in person."
# Common pattern: a careful written objection (with simulations, plots,
# numbers) is answered with a single line proposing a verbal resolution
# in an unminuted setting.

- id: coffee_to_break
  text: "Methodological dispute moved to the coffee break..."
  tags: [researcher_dof, story_first]
  rarity: common
  trigger_phase: loading

- id: coffee_side_meeting
  text: "Issue parked for a small side-meeting at the retreat..."
  tags: [researcher_dof, story_first]
  rarity: common
  trigger_phase: loading

- id: coffee_offline
  text: "Concern logged; resolution deferred to offline discussion..."
  tags: [researcher_dof, narrative]
  rarity: uncommon
  trigger_phase: loading

- id: coffee_record_clean
  text: "Written record kept clean; discussion verbal..."
  tags: [researcher_dof, story_first, narrative]
  rarity: uncommon
  trigger_phase: loading

- id: coffee_workshop_margins
  text: "Difficult point shelved for the workshop margins..."
  tags: [researcher_dof, story_first]
  rarity: rare
  trigger_phase: loading
  mascot_state_affinity: [polishing]

- id: coffee_in_person
  text: "Email thread paused; will resolve in person..."
  tags: [researcher_dof, narrative]
  rarity: rare
  trigger_phase: loading

- id: coffee_one_liner
  text: "Six-paragraph objection answered with one polite line..."
  tags: [researcher_dof, story_first, narrative]
  rarity: rare
  trigger_phase: loading
  mascot_state_affinity: [resolved]
