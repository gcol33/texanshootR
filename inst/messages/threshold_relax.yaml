# Threshold-relaxation messages — fired when +tier2 is active, or when
# the search invents a downweighted second tier after the pre-registered
# cutoff yields too few cases.

- id: tier_too_few
  text: "Pre-registered threshold yields N = 4..."
  tags: [researcher_dof, post_hoc]
  rarity: common
  trigger_phase: loading

- id: tier_introducing_two
  text: "Introducing tier 2 at threshold minus 30..."
  tags: [researcher_dof, post_hoc]
  rarity: common
  trigger_phase: loading

- id: tier_downweight_07
  text: "Downweighting relaxed cases at 0.7..."
  tags: [researcher_dof, cherry_picking]
  rarity: uncommon
  trigger_phase: loading

- id: tier_ceases_to_apply
  text: "60 is where the standard ceases to apply..."
  tags: [researcher_dof, post_hoc, narrative]
  rarity: uncommon
  trigger_phase: loading

- id: tier_backdated
  text: "Tier-2 inclusion criteria backdated to Methods..."
  tags: [researcher_dof, post_hoc, story_first]
  rarity: rare
  trigger_phase: loading
  mascot_state_affinity: [polishing]

- id: tier_special_case
  text: "Keeping the failing case for unrelated reasons..."
  tags: [cherry_picking, researcher_dof]
  rarity: rare
  trigger_phase: loading
  mascot_state_affinity: [desperate]
