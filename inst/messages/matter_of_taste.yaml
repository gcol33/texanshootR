# Matter-of-taste messages -- fired when +matter_of_taste is active,
# or when the search responds to a falsifiable, testable concern by
# casting it as a matter of preference, perspective, or interpretive
# style.
#
# Rhetorical forms (general):
#   "I see your point, but I think it is fine"
#   "this is just one way to look at it"
#   "reasonable people can disagree on this"
# Common signature: a concern that has a yes/no answer in principle
# is re-described as aesthetic.

- id: taste_softened
  text: "Falsifiable concern softened to perspective..."
  tags: [deflection, story_first]
  rarity: common
  trigger_phase: loading

- id: taste_point_taken
  text: "I see your point, but I think it is fine..."
  tags: [deflection, narrative]
  rarity: common
  trigger_phase: loading

- id: taste_one_way
  text: "Just one way to look at it (other ways also exist)..."
  tags: [deflection, narrative]
  rarity: uncommon
  trigger_phase: loading

- id: taste_recast_stylistic
  text: "Testable disagreement recast as stylistic..."
  tags: [deflection, story_first]
  rarity: uncommon
  trigger_phase: loading

- id: taste_invite_disagreement
  text: "Reader invited to disagree on aesthetic grounds..."
  tags: [deflection, narrative]
  rarity: rare
  trigger_phase: loading

- id: taste_null_deemed_opinion
  text: "Null simulation deemed a matter of taste..."
  tags: [deflection, story_first]
  rarity: rare
  trigger_phase: loading
  mascot_state_affinity: [resolved, polishing]
