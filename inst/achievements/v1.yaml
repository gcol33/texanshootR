# 20 v1 achievements: 10 visible (progression) + 10 hidden (discovery).
# Visible slots map to the v1 priority subset of the fallacy contract.

# ---- Visible / progression -----------------------------------------

- id: ach_first_run
  name: "First Submission"
  visible: true
  hint: "Complete your first shoot()."
  reveal_text: "First Submission — A career begins."
  trigger: trigger_first_run
  cosmetic: cosmetic_badge_orcid

- id: ach_aim_after_data
  name: "Texas Sharpshooter"
  visible: true
  hint: "Highlight a model after running a search."
  reveal_text: "Texas Sharpshooter — Aimed at the wall, painted the target."
  trigger: trigger_aim_after_data
  cosmetic: cosmetic_stetson

- id: ach_p_hacked
  name: "Within Tolerances"
  visible: true
  hint: "Highlight a model with p between 0.045 and 0.052."
  reveal_text: "Within Tolerances — A reportable result."
  trigger: trigger_p_hacked

- id: ach_harker
  name: "Predicted as Hypothesised"
  visible: true
  hint: "Generate a manuscript() for a run with no a priori hypothesis."
  reveal_text: "Predicted as Hypothesised — The framing was always going to be this."
  trigger: trigger_harker

- id: ach_multiple_comparisons
  name: "Comprehensive Search"
  visible: true
  hint: "Fit at least 1000 specifications in one run."
  reveal_text: "Comprehensive Search — All avenues explored."
  trigger: trigger_multiple_comparisons

- id: ach_subgroup_fisher
  name: "Targeted Subsample"
  visible: true
  hint: "Highlight a result from a subgroup-fishing seed."
  reveal_text: "Targeted Subsample — A robust subset identified."
  trigger: trigger_subgroup_fisher

- id: ach_outlier_excluder
  name: "Robustness Check"
  visible: true
  hint: "Highlight a result after dropping inconvenient observations."
  reveal_text: "Robustness Check — Result holds with informative subset."
  trigger: trigger_outlier_excluder
  cosmetic: cosmetic_poncho_lab

- id: ach_overfitter
  name: "High Fit Quality"
  visible: true
  hint: "Highlight a model with R-squared >= 0.99 and many terms."
  reveal_text: "High Fit Quality — Excellent in-sample performance."
  trigger: trigger_overfitter
  cosmetic: cosmetic_lanyard_neurips

- id: ach_publication_pipeline
  name: "Publication Pipeline"
  visible: true
  hint: "Generate three or more outputs across your career."
  reveal_text: "Publication Pipeline — A productive trajectory."
  trigger: trigger_publication_pipeline
  cosmetic: cosmetic_badge_oa

- id: ach_var_purge
  name: "Streamlined Specification"
  visible: true
  hint: "Drop five or more predictors in a single run."
  reveal_text: "Streamlined Specification — Parsimony achieved."
  trigger: trigger_var_purge

